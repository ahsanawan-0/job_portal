<!-- Modal Overlay -->
<div
  *ngIf="isVisible"
  class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
  (click)="closeModal()" 
>
  <!-- Modal Content -->
  <div
    class="bg-white p-6 rounded-md shadow-lg relative w-11/12 max-w-md"
    (click)="$event.stopPropagation()"  
  >
    <!-- Close (X) Button -->
    <button
      class="absolute top-2 right-2 text-gray-600 text-2xl font-bold"
      (click)="closeModal()"
      aria-label="Close Modal"
    >
      &times;
    </button>

    <!-- Modal Header -->
    <h2 class="text-2xl font-semibold mb-4">Apply for this Job</h2>

    <!-- Cover Letter Text Area -->
    <div class="mb-4">
      <label for="coverLetter" class="block text-gray-700 mb-2">Cover Letter</label>
      <textarea
        id="coverLetter"
        [(ngModel)]="coverLetter"
        name="coverLetter"
        rows="5"
        placeholder="Write your cover letter..."
        class="w-full p-2 border border-gray-300 rounded-md"
      ></textarea>
    </div>

    <!-- Resume Upload -->
    <div class="mb-4">
      <label for="resumeUpload" class="block text-gray-700 mb-2">Upload Resume</label>
      <input
        type="file"
        id="resumeUpload"
        (change)="onFileSelected($event)"
        class="w-full p-2 border border-gray-300 rounded-md"
      />
    </div>

    <!-- Submit and Cancel Buttons -->
    <div class="flex justify-end space-x-2">
      <button
        type="button"
        class="bg-gray-400 text-white px-4 py-2 rounded-md"
        (click)="closeModal()"
      >
        Cancel
      </button>
      <button
        type="button"
        class="bg-blue-500 text-white px-4 py-2 rounded-md"
        (click)="submitApplication()"
      >
        Submit Application
      </button>
    </div>
  </div>
</div>
