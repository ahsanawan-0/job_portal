<div class="min-h-screen bg-[#FCFCFC]">
  <!-- Navbar -->
  <header class="flex items-center justify-between h-24 bg-blue-600 text-white px-6">
    <h1 class="text-xl font-bold">My Website</h1>
  </header>

  <!-- Main Content Area -->
  <div class="flex">
    <!-- Left Sidebar -->
    <aside class="w-72 bg-blue-200 shadow-md p-4">
      <h2 class="text-lg font-semibold mb-4">Sidebar</h2>
      <ul class="space-y-2">
        <li><a href="#" class="text-blue-600">Link 1</a></li>
        <li><a href="#" class="text-blue-600">Link 2</a></li>
        <li><a href="#" class="text-blue-600">Link 3</a></li>
      </ul>
    </aside>

    <!-- Main Area -->
    <main class="flex-1 p-5  bg-[#FCFCFC]">

        <div class="w-full">
        <div class="flex justify-between mb-6">
          <div class="text-2xl text-[#18191C]">Create Exit Interview Form</div>
          <div>
            <button class="bg-[#0A65CC] text-white flex justify-center gap-4 px-5 py-3 rounded-md">
              <span><img src="assets/icons/ShareNetwork.svg" alt=""></span>Share Link
            </button>
          </div>
        </div>

        <!-- Input fields in a column -->
        <div class="space-y-4 w-2/3">
          <div>
            <label for="formTitle1" class="block text-[#18191C] text-sm font-medium mb-2 ">Form Title</label>
            <input 
              type="text" 
              placeholder="Enter Form Title" 
              id="formTitle1"
              class="border border-borderColor rounded-md w-full px-3 py-2 focus:outline-none "
            />
          </div>
          <div>
            <label for="formTitle2" class="block text-[#18191C] text-sm font-medium   mb-2">Question</label>
            <input 
              type="text" 
              placeholder="Enter a Question" 
              id="formTitle2"
              class="border border-borderColor rounded-md w-full px-3 py-2 focus:outline-none"
            />
          </div>
          <div>
            <label for="formTitle3" class="block text-[#18191C] text-sm font-medium mb-2">Question</label>
            <input 
              type="text" 
              placeholder="Enter a Question" 
              id="formTitle3"
              class="border border-borderColor rounded-md w-full px-3 py-2 focus:outline-none"
            />
          </div>
        </div>

        <!-- Add Question Button -->
        <div class="flex mt-6">
          <button class="border border-[#0A65CC] rounded-md  flex justify-center items-center gap-2 px-5 py-3 text-[#0A65CC] font-semibold">
            <img src="/assets/icons/fi_plus-circle.svg" alt="Add">
        Add Question
          </button>
        </div>

        <!-- Save Button -->
        <div class="flex justify-start mt-6">
          <button class="bg-[#0A65CC] text-white px-6 py-3 rounded-md flex justify-center items-center gap-3">
            Save <span><img src="assets/icons/fi_arrow-right.svg" alt=""></span>
          </button>
        </div>
      </div>
    </main>
  </div>
</div>
